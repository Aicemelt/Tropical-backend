# ===============================
# 서버 설정
# ===============================
server:
  port: ${SERVER_PORT:9005}  # 서버 포트 번호 (환경변수 또는 기본값 9005)

# ===============================
# Spring Boot 기본 설정
# ===============================
spring:
  # 애플리케이션 기본 정보
  application:
    name: tropical-app  # 애플리케이션 이름
  profiles:
    active: dev  # 활성 프로파일 (dev, prod 등)
  # JSON 직렬화 설정 (LocalDate 처리용)
  jackson:
    serialization:
      write-dates-as-timestamps: false

  # spring ai 설정
  # https://api.openai.com/v1 - gpt baseUrl
  # https://generativelanguage.googleapis.com/v1beta/openai/
  ai:
    openai:
      base-url: https://api.openai.com/v1
      api-key: ${GPT_API_KEY}
      chat:
        completions-path: /chat/completions
        options:
          model: ${GPT_MODEL}
          temperature: 0.2
          max-tokens: 1024
    retry:
      on-client-errors: true
      on-http-codes: 429,503
      initial-interval: 500ms
      max-attempts: 3

  # 데이터베이스 연결 설정 (MariaDB)
  datasource:
    url: ${DB_URL}  # 데이터베이스 URL (환경변수에서 가져옴)
    username: ${DB_USERNAME}  # 데이터베이스 사용자명
    password: ${DB_PASSWORD}  # 데이터베이스 비밀번호
    driver-class-name: org.mariadb.jdbc.Driver  # MariaDB JDBC 드라이버

  # JPA/Hibernate 설정
  jpa:
    hibernate:
      ddl-auto: update  # 스키마 자동 관리 (update: 변경사항만 반영, create-drop: 시작시 생성/종료시 삭제)
    open-in-view: false  # OSIV 비활성화 (성능상 권장, 지연로딩 문제 방지)
    show-sql: true  # 실행되는 SQL 쿼리를 콘솔에 출력
    properties:
      hibernate:
        format_sql: true  # SQL 쿼리를 보기 좋게 포맷팅
        default_batch_fetch_size: 100  # N+1 문제 해결을 위한 배치 사이즈
        dialect: org.hibernate.dialect.MariaDBDialect  # MariaDB 전용 SQL 방언

  # 이메일 발송 설정 (JavaMailSender가 참조)
  mail:
    host: ${SMTP_HOST}                     # 예: smtp.gmail.com / smtp.naver.com
    port: ${SMTP_PORT}                     # 587(STARTTLS) 또는 465(SSL)
    username: ${SMTP_USERNAME}             # SMTP 로그인 아이디
    password: ${SMTP_PASSWORD}             # SMTP 비밀번호(또는 앱 비밀번호)
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:true}          # SMTP 인증 사용
          starttls:
            enable: ${SMTP_STARTTLS:true}  # 587 사용 시 보통 true
          ssl:
            enable: ${SMTP_SSL:false}      # 465 사용 시 true

  # Spring Security OAuth2 설정
  security:
    oauth2:
      client:
        # OAuth2 클라이언트 등록 정보
        registration:
          # 구글 OAuth2 설정
          google:
            client-id: ${GOOGLE_CLIENT_ID}  # 구글 클라이언트 ID
            client-secret: ${GOOGLE_CLIENT_SECRET}  # 구글 클라이언트 시크릿
            scope: openid, profile, email  # 요청할 사용자 정보 범위
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"  # 인증 후 리다이렉트 URI
            authorization-grant-type: authorization_code  # OAuth2 인증 방식

          # 카카오 OAuth2 설정
          kakao:
            client-id: ${KAKAO_CLIENT_ID}  # 카카오 클라이언트 ID
            client-secret: ${KAKAO_CLIENT_SECRET}  # 카카오 클라이언트 시크릿
            client-authentication-method: client_secret_post  # 클라이언트 인증 방식
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: account_email, profile_nickname  # 카카오에서 제공하는 사용자 정보

          # 네이버 OAuth2 설정
          naver:
            client-id: ${NAVER_CLIENT_ID}  # 네이버 클라이언트 ID
            client-secret: ${NAVER_CLIENT_SECRET}  # 네이버 클라이언트 시크릿
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: name, email  # 네이버에서 제공하는 사용자 정보

        # OAuth2 제공자별 엔드포인트 설정
        provider:
          # 카카오 OAuth2 엔드포인트 (구글은 Spring Boot가 자동 설정)
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize  # 인증 요청 URL
            token-uri: https://kauth.kakao.com/oauth/token  # 토큰 요청 URL
            user-info-uri: https://kapi.kakao.com/v2/user/me  # 사용자 정보 요청 URL
            user-name-attribute: id  # 사용자 식별자로 사용할 속성명

          # 네이버 OAuth2 엔드포인트
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize  # 네이버 인증 URL
            token-uri: https://nid.naver.com/oauth2.0/token  # 네이버 토큰 URL
            user-info-uri: https://openapi.naver.com/v1/nid/me  # 네이버 사용자 정보 URL
            user-name-attribute: response  # 네이버 응답 구조에서 사용자 정보가 담긴 키

# ===============================
# JWT 토큰 설정 (JwtTokenProvider와 매칭)
# ===============================
jwt:
  secret: ${JWT_SECRET:VGhpcy1pcy1hLXNhbXBsZS1iYXNlNjQtc2VjcmV0LXB1dC15b3VyLW93bg==}
  access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION:900000}       # 15분 (밀리초)
  refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION:1209600000} # 14일 (밀리초)
  email-verify-expiration: ${JWT_EMAIL_VERIFY_EXPIRATION:1800000}         # 30분 (밀리초)
  password-reset-expiration: ${JWT_PASSWORD_RESET_EXPIRATION:3600000}     # 1시간 (밀리초)
  onboarding-token-expiration-ms: ${JWT_ONBOARDING_TOKEN_EXPIRATION:1800000} # 30분 (밀리초)

# ===============================
# 애플리케이션 커스텀 설정
# ===============================
app:
  # 애플리케이션 이름
  name: "TropiCal"

  # URL 설정 (.env의 APP_BASE_URL 사용)
  frontend:
    base-url: http://localhost:5005  # .env OAuth2 리다이렉트와 일치
  backend:
    base-url: ${APP_BASE_URL:http://localhost:9005}  # .env의 APP_BASE_URL

  # 이메일 발신/제어 및 인증 링크 베이스 URL
  mail:
    from: ${SMTP_FROM:noreply@tropical.local}      # 이메일 From 주소
    from-name: ${SMTP_FROM_NAME:TropiCal}          # 표시 이름
    enabled: ${MAIL_ENABLED:true}                  # 메일 발송 on/off
    redirect-to: ${MAIL_REDIRECT_TO:}              # (선택) 모든 수신자를 이 주소로 강제 리다이렉트
    bcc: ${MAIL_BCC:}                              # (선택) 우리 팀 BCC 사본 (쉼표로 다중)
    reply-to: ${MAIL_REPLY_TO:}                    # (선택) 회신 받을 주소

  # OAuth2 로그인 후 리다이렉트 URL 설정
  oauth2-success-redirect-url: http://localhost:5005/dashboard  # 로그인 성공시 이동할 프론트엔드 URL
  oauth2-failure-redirect-url: http://localhost:5005/login?error=oauth2  # 로그인 실패시 이동할 URL

# ===============================
# CORS 설정 (Cross-Origin Resource Sharing)
# ===============================
cors:
  allowed-origins:
    - http://localhost:5005  # 허용할 프론트엔드 도메인
  allowed-methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS  # 허용할 HTTP 메서드들
  allowed-headers:
    - "*"  # 허용할 헤더 (모든 헤더 허용)
  allow-credentials: true  # 쿠키 및 인증 헤더 허용

# ===============================
# 공휴일 API 설정 (한국천문연구원)
# ===============================
holiday:
  api-base: https://apis.data.go.kr/B090041/openapi/service/SpcdeInfoService
  api-key: ${HOLIDAY_API_KEY}
  connect-timeout-ms: 3000
  read-timeout-ms: 4000
  page-no: 1
  num-of-rows: 100

# ===============================
# 로깅 설정
# ===============================
logging:
  level:
    com.tropical.backend: DEBUG  # 애플리케이션 패키지의 로그 레벨 (개발시 DEBUG 권장)
    org.springframework.security: INFO  # Spring Security 로그 레벨
    org.hibernate.SQL: INFO  # Hibernate SQL 로그 레벨
    org.springframework.mail: DEBUG  # 이메일 발송 로그 레벨 (개발시)